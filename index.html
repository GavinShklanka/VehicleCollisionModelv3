<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
<title>VCM V3</title>
<style>
  :root {
    /* Light theme — used by [data-theme="light"] */
    --l-bg:        #FFFFFF;
    --l-bg-2:      #F7FAFC;
    --l-bg-3:      #EDF2F7;
    --l-text:      #1A202C;
    --l-text-2:    #4A5568;
    --l-muted:     #718096;
    --l-border:    #E2E8F0;
    --l-primary:   #2C5282;
    --l-primary-2: #4299E1;
    --l-land-bg:   #FFFBEA;
    --l-land-bd:   #D4A017;
    --l-land-tx:   #5C3C00;
    --l-scope-bg:  #FFF5F5;
    --l-scope-bd:  #C53030;
    --l-scope-tx:  #742A2A;

    /* Dark theme — low-glare default for on-camera use */
    --d-bg:        #0B1220;
    --d-bg-2:      #131C30;
    --d-bg-3:      #1B2640;
    --d-text:      #F1F5F9;
    --d-text-2:    #CBD5E0;
    --d-muted:     #94A3B8;
    --d-border:    #233152;
    --d-primary:   #7FB3FF;
    --d-primary-2: #4F8DE0;
    --d-land-bg:   #2A2410;
    --d-land-bd:   #E2B73C;
    --d-land-tx:   #FFE8A3;
    --d-scope-bg:  #2A1414;
    --d-scope-bd:  #FF8585;
    --d-scope-tx:  #FFD0D0;
  }
  :root, [data-theme="dark"] {
    --bg:        var(--d-bg);
    --bg-2:      var(--d-bg-2);
    --bg-3:      var(--d-bg-3);
    --text:      var(--d-text);
    --text-2:    var(--d-text-2);
    --muted:     var(--d-muted);
    --border:    var(--d-border);
    --primary:   var(--d-primary);
    --primary-2: var(--d-primary-2);
    --land-bg:   var(--d-land-bg);
    --land-bd:   var(--d-land-bd);
    --land-tx:   var(--d-land-tx);
    --scope-bg:  var(--d-scope-bg);
    --scope-bd:  var(--d-scope-bd);
    --scope-tx:  var(--d-scope-tx);
  }
  [data-theme="light"] {
    --bg:        var(--l-bg);
    --bg-2:      var(--l-bg-2);
    --bg-3:      var(--l-bg-3);
    --text:      var(--l-text);
    --text-2:    var(--l-text-2);
    --muted:     var(--l-muted);
    --border:    var(--l-border);
    --primary:   var(--l-primary);
    --primary-2: var(--l-primary-2);
    --land-bg:   var(--l-land-bg);
    --land-bd:   var(--l-land-bd);
    --land-tx:   var(--l-land-tx);
    --scope-bg:  var(--l-scope-bg);
    --scope-bd:  var(--l-scope-bd);
    --scope-tx:  var(--l-scope-tx);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro Text", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: contain;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ───────── sticky top: dots + time + jump ───────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: linear-gradient(to bottom, var(--bg) 70%, color-mix(in srgb, var(--bg) 70%, transparent));
    padding: calc(env(safe-area-inset-top, 0px) + 0.6rem) 1rem 0.4rem 1rem;
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
  }
  .topbar-inner {
    max-width: 640px;
    margin: 0 auto;
  }
  .topline {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 0.45rem;
  }
  .beat-time {
    color: var(--primary);
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: 0.01em;
    min-height: 1.4rem;
  }
  .theme-toggle {
    width: 44px; height: 44px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 999px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-2);
    cursor: pointer;
    font-size: 1.15rem;
    flex: 0 0 auto;
  }
  .theme-toggle:active { background: var(--bg-3); }
  .topline-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 0 0 auto;
  }
  .sections-toggle {
    height: 44px;
    min-width: 44px;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0 0.85rem;
    border-radius: 999px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-2);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .sections-toggle:active { background: var(--bg-3); }
  .sections-toggle[aria-expanded="true"] {
    background: var(--primary);
    color: var(--bg);
    border-color: var(--primary);
  }
  .sections-caret {
    font-size: 0.85rem;
    line-height: 1;
    transition: transform 0.25s ease;
  }
  .sections-toggle[aria-expanded="true"] .sections-caret { transform: rotate(180deg); }

  /* grid-row trick: collapses jump-row to zero height with no fixed value */
  .jump-collapse {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.28s ease;
  }
  .jump-collapse.open { grid-template-rows: 1fr; }
  .jump-collapse-inner { overflow: hidden; min-height: 0; }

  .progress-row {
    display: flex; justify-content: center; gap: 8px;
    padding: 0.1rem 0 0.5rem 0;
  }
  .dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--border);
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .dot.active { background: var(--primary); transform: scale(1.15); }
  .jump-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
    padding-bottom: 0.4rem;
  }
  .jump-btn {
    height: 44px;
    font-size: 0.95rem;
    font-weight: 600;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-2);
    color: var(--text-2);
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.01em;
  }
  .jump-btn[aria-current="true"] {
    background: var(--primary);
    color: var(--bg);
    border-color: var(--primary);
  }

  /* ───────── beat body ───────── */
  main.wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 0.4rem 1rem calc(env(safe-area-inset-bottom, 0px) + 7.5rem) 1rem;
  }
  .beat-title {
    font-size: 1.65rem;
    font-weight: 800;
    line-height: 1.22;
    letter-spacing: -0.01em;
    margin: 0.1rem 0 0.85rem 0;
  }
  .claim {
    background: var(--bg-2);
    border-left: 4px solid var(--primary);
    padding: 0.85rem 1rem;
    font-weight: 700;
    font-style: italic;
    font-size: 1.12rem;
    line-height: 1.4;
    margin: 0.4rem 0 1.1rem 0;
    border-radius: 0 8px 8px 0;
  }
  .line {
    font-size: 1.18rem;
    line-height: 1.45;
    padding: 0.7rem 0.2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
    align-items: flex-start;
  }
  .line:last-of-type { border-bottom: 0; }
  .arrow {
    color: var(--primary);
    font-weight: 800;
    flex: 0 0 auto;
    line-height: 1.45;
  }
  .land {
    background: var(--land-bg);
    border: 2px solid var(--land-bd);
    color: var(--land-tx);
    padding: 1rem 1.1rem;
    font-weight: 800;
    font-size: 1.22rem;
    line-height: 1.35;
    margin: 1.1rem 0 0.4rem 0;
    border-radius: 10px;
    text-align: center;
  }
  .scope {
    background: var(--scope-bg);
    border-left: 4px solid var(--scope-bd);
    color: var(--scope-tx);
    padding: 0.7rem 0.9rem;
    font-size: 0.95rem;
    line-height: 1.4;
    margin-top: 1.1rem;
    border-radius: 0 8px 8px 0;
  }

  /* ───────── sticky bottom nav (thumb reach) ───────── */
  .bottom-nav {
    position: fixed;
    left: 0; right: 0;
    bottom: 0;
    z-index: 25;
    padding: 0.55rem 1rem calc(env(safe-area-inset-bottom, 0px) + 0.55rem) 1rem;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    border-top: 1px solid var(--border);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
  }
  .bottom-inner {
    max-width: 640px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 80px 1fr;
    gap: 8px;
    align-items: center;
  }
  .nav-btn {
    height: 56px;
    width: 100%;
    font-size: 1.1rem;
    font-weight: 700;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-2);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
  }
  .nav-btn.primary {
    background: var(--primary);
    color: var(--bg);
    border-color: var(--primary);
  }
  .nav-btn:active { filter: brightness(0.92); }
  .nav-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    filter: grayscale(0.3);
  }
  .count {
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    user-select: none;
  }

  /* ───────── responsive bumps ───────── */
  @media (min-width: 480px) {
    .beat-title { font-size: 1.85rem; }
    .line { font-size: 1.22rem; }
    .claim { font-size: 1.18rem; }
    .jump-btn { font-size: 1.0rem; }
  }
  @media (min-width: 720px) {
    .beat-title { font-size: 2.05rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .dot { transition: none; }
    .jump-collapse { transition: none; }
    .sections-caret { transition: none; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topline">
        <div class="beat-time" id="time" aria-live="polite"></div>
        <div class="topline-actions">
          <button class="sections-toggle" id="sections-toggle" type="button"
                  aria-expanded="false" aria-controls="jump-collapse">
            Sections <span class="sections-caret" aria-hidden="true">▾</span>
          </button>
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark">
            <span id="theme-icon">☀︎</span>
          </button>
        </div>
      </div>
      <div class="progress-row" id="dots" role="tablist" aria-label="Beat progress"></div>
      <div class="jump-collapse" id="jump-collapse">
        <div class="jump-collapse-inner">
          <div class="jump-row">
            <button class="jump-btn" id="jump-s" type="button">Strengths</button>
            <button class="jump-btn" id="jump-w" type="button">Weaknesses</button>
            <button class="jump-btn" id="jump-l" type="button">Limits</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap" role="main">
    <h1 class="beat-title" id="title"></h1>
    <div class="claim" id="claim"></div>
    <div id="lines"></div>
    <div class="land" id="land" hidden></div>
    <div class="scope" id="scope"></div>
  </main>

  <nav class="bottom-nav" aria-label="Beat navigation">
    <div class="bottom-inner">
      <button class="nav-btn" id="prev" type="button" aria-label="Previous beat">◀ Prev</button>
      <div class="count" id="count" aria-live="polite"></div>
      <button class="nav-btn primary" id="next" type="button" aria-label="Next beat">Next ▶</button>
    </div>
  </nav>

<script>
const BEATS = [
  {
    id: "open",
    time: "0:00 – 0:30",
    title: "Opener — what this talk is",
    claim: "We used AI to audit our own crash severity model — and AI found things we missed.",
    lines: [
      "V1 and V2 of our Nova Scotia Vehicle Collision Severity Model — built over two semesters",
      "we asked: given a crash on a Nova Scotia road, how severe is it likely to be?",
      "then we put V2 through an AI audit — Claude as the analytical partner",
      "what came back: strengths we underclaimed, weaknesses we missed, limits we hadn't named",
      "the AI didn't write the model — it pressure-tested the claims",
    ],
    scope: "About: using AI as an audit partner on our own work. Not about: AI replacing modellers.",
  },
  {
    id: "context",
    time: "0:30 – 1:00",
    title: "What the model does",
    claim: "A severity map, not a crash predictor.",
    lines: [
      "given a crash has happened — how bad is it likely to be",
      "tells EMS where to stage ambulances",
      "tells trauma centres when to mobilize before the patient arrives",
      "tells drivers which conditions push severity hardest",
      "two versions built — now under audit",
    ],
    scope: "About: severity given a crash. Not about: predicting whether a crash happens.",
  },
  {
    id: "strengths1",
    time: "1:00 – 1:30",
    title: "STRENGTHS (1/3) — the honest test",
    claim: "V1 set the algorithm. V2 made the test honest.",
    lines: [
      "V1 used XGBoost — gradient-boosted trees, where each tree learns from the last tree's mistakes",
      "V1 AUC 0.642 — AUC is 0.5 for random guessing, 1.0 for perfect ranking",
      "V1's strongest predictors were Environment Canada weather — temperature, wind, visibility, precipitation",
      "V2 fixed the exam — trained on the past (Jan 24 to Jul 25), tested on the future (Aug 25 to Jan 26)",
      "V1's random 80/20 split was a multiple-choice test where the answer key leaked into study",
      "V2's temporal split is a written-response exam under harsh conditions",
      "the audit confirmed this — same student, harder test, the score that matters",
    ],
    scope: "About: V2's methodology under harder test conditions. Not about: a bigger accuracy number.",
  },
  {
    id: "strengths2",
    time: "1:30 – 2:00",
    title: "STRENGTHS (2/3) — the 8 engineered features",
    claim: "Eight features survived the cut — each one a behavioral story.",
    lines: [
      "ablation — V2 pulled each of 35 features out, retrained, kept the ones that hurt to remove",
      "the 8 features that survived — each one carries a behavioral story",
      "posted speed (proxy from road class) — faster roads, more energy in the crash",
      "hour of day — late-night and dusk windows compress driver reaction time",
      "weather severity rank — engineered from surface and visibility, captures storm conditions",
      "number of vehicles — single-vehicle crashes are different physics than multi-vehicle",
      "aggressive driving flag — speeding, tailgating, lane-change behavior at scene",
      "impaired driving flag — alcohol or drug indication at scene",
      "road surface severity — wet, snow, ice ranked by historical severity contribution",
      "any turning movement — turning crashes versus straight-line crashes",
    ],
    scope: "About: V2's methodology under harder test conditions. Not about: a bigger accuracy number.",
  },
  {
    id: "strengths3",
    time: "2:00 – 2:30",
    title: "STRENGTHS (3/3) — four driving archetypes",
    claim: "Those eight features describe four kinds of driver.",
    lines: [
      "these 8 collectively describe four driving archetypes the model recognizes",
      "archetype 1 — the late-night solo run — single vehicle, dusk or dark, often impaired or aggressive",
      "archetype 2 — the bad-weather commuter — multi-vehicle, wet or snow surface, daytime",
      "archetype 3 — the high-speed turning conflict — turning movement on a high-speed road",
      "archetype 4 — the urban congestion crash — multi-vehicle, low speed, daytime, low severity",
      "the first three lift severity; the fourth is the baseline",
      "78% fewer inputs, same accuracy — when these factors combine, severity goes up",
      "V2 also measured XGBoost is overconfident, Random Forest is honest — V1 never checked",
    ],
    scope: "About: V2's methodology under harder test conditions. Not about: a bigger accuracy number.",
  },
  {
    id: "weaknesses1",
    time: "2:30 – 2:55",
    title: "WEAKNESSES (1/3) — the bad calls",
    claim: "Two bad calls the audit named first.",
    lines: [
      "1. the headline +0.0156 improvement over V1 is smaller than the noise — statistically invisible",
      "2. V2 dropped crash type during ablation — rollovers are 58.5% severe, rear-ends 20%",
      "the biggest causal lever in our own data, optimized away — bad call",
    ],
    scope: "About: six concrete failures the audit named. Not about: blaming the V2 timeline.",
  },
  {
    id: "weaknesses2",
    time: "2:55 – 3:20",
    title: "WEAKNESSES (2/3) — the missing inputs",
    claim: "Two inputs we promised that weren't there.",
    lines: [
      "3. V2 promised true posted speeds from the NS Road Network — the audit checked, that field does not exist",
      "4. Environment Canada weather went missing entirely — V1's strongest predictors, gone",
    ],
    scope: "About: six concrete failures the audit named. Not about: blaming the V2 timeline.",
  },
  {
    id: "weaknesses3",
    time: "3:20 – 3:45",
    title: "WEAKNESSES (3/3) — precision, recall, calibration",
    claim: "The metrics that aren't deployment-ready yet.",
    lines: [
      "5. precision and recall at the default threshold — both off the deployment bar",
      "precision 0.288 — of the crashes the model flags as severe, only 29% actually are",
      "plain English — 10 flagged, 3 are real, 7 are false alarms",
      "recall 0.552 — of the crashes that actually were severe, the model caught 55%",
      "plain English — 10 severe crashes happened, the model spotted 6, missed 4",
      "the trade-off — tune the threshold for higher recall, false alarms climb; tune for precision, misses climb",
      "V2 left the threshold at default 0.5 — V3 tunes it explicitly with a cost ratio",
      "6. V2 never measured its own ensemble's probability honesty — blank cell in the table",
    ],
    scope: "About: six concrete failures the audit named. Not about: blaming the V2 timeline.",
  },
  {
    id: "limits1",
    time: "3:45 – 4:00",
    title: "LIMITATIONS (1/3) — the structural ceiling",
    claim: "A ceiling the data itself imposes.",
    lines: [
      "structural ceiling — police-reported data caps AUC near 0.65 to 0.70",
      "past that needs telematics speed, on-scene weather, or hospital outcomes",
      "that's a data investment, not a modelling fix",
    ],
    scope: "About: bounded scope, named honestly. Not about: framing limits as failure.",
  },
  {
    id: "limits2",
    time: "4:00 – 4:15",
    title: "LIMITATIONS (2/3) — rural weather gaps",
    claim: "Where the weather signal runs out.",
    lines: [
      "rural weather coverage — Environment Canada stations have a 20 km usable radius",
      "rural Nova Scotia has gaps between stations",
      "a crash 40 km from the nearest station is borrowing weather, not observing it",
    ],
    scope: "About: bounded scope, named honestly. Not about: framing limits as failure.",
  },
  {
    id: "limits3",
    time: "4:15 – 4:30",
    title: "LIMITATIONS (3/3) — conditional by design",
    claim: "What the model was never built to answer.",
    lines: [
      "conditional model — predicts severity given a crash, not whether a crash happens",
    ],
    scope: "About: bounded scope, named honestly. Not about: framing limits as failure.",
  },
  {
    id: "fix",
    time: "4:30 – 5:30",
    title: "FIX — V3 with what we already have",
    claim: "Confidence intervals, two levers restored, cost-aware threshold, flagged-risk score on weather.",
    lines: [
      "bootstrapping — run the model 2000 times on slightly different samples for an honest range",
      "not scores 0.65 — scores between 0.61 and 0.69 — like a weather forecast saying 60 to 70 percent",
      "restore lever 1 — Environment Canada weather back in, V1's biggest signal",
      "plus a flagged risk score per crash — distance to nearest weather station logged",
      "under 20 km — high confidence the weather signal is real",
      "over 20 km — degraded confidence flag, user sees it",
      "the rural problem named honestly — here is where the weather is real",
      "restore lever 2 — crash type back in — rollover, head-on, right-angle as the severity signals",
      "posted speed via OpenStreetMap free public API, Google Maps speed-limit as cross-reference",
      "AUC and precision both lift — flagging severe when the biggest causal levers say so",
      "cost-aware threshold — missing a severe corridor is five times more expensive than over-staging",
      "tested per route — Hwy 333 alone is 37.2% severe on 113 crashes, highest in Nova Scotia",
      "non-highway severe rate 26.3% versus highway 15.5%",
      "data needed for all of this: zero new acquisitions",
    ],
    scope: "About: V3 fix using free public data and disciplined re-use. Not about: asking for new acquisitions.",
  },
  {
    id: "close",
    time: "5:30 – 6:00",
    title: "Closer — what changes",
    claim: "AI didn't replace the analyst — it sharpened the audit.",
    lines: [
      "V2 gave us a working severity model",
      "the AI audit gave us a list of what V2 missed about itself",
      "V3 fixes those gaps with data we already have",
      "the output is a corridor-by-time-by-condition risk surface",
      "EMS planners, trauma centres, rural response analysts can use it without revisiting the methodology",
    ],
    land: "That is resource allocation, proactively. Thank you.",
    scope: "About: AI-assisted audit as the workflow. Not about: AI as the modeller.",
  },
];

const JUMP_INDEX = { strengths: 2, weaknesses: 5, limits: 8 };
// each section spans 3 slides; highlight its button across the whole range
const JUMP_RANGE = { strengths: [2, 4], weaknesses: [5, 7], limits: [8, 10] };

const el = (id) => document.getElementById(id);
const dotsEl   = el("dots");
const timeEl   = el("time");
const titleEl  = el("title");
const claimEl  = el("claim");
const linesEl  = el("lines");
const landEl   = el("land");
const scopeEl  = el("scope");
const countEl  = el("count");
const prevBtn  = el("prev");
const nextBtn  = el("next");
const jumpS    = el("jump-s");
const jumpW    = el("jump-w");
const jumpL    = el("jump-l");
const themeBtn = el("theme-toggle");
const themeIcn = el("theme-icon");
const sectionsToggle = el("sections-toggle");
const jumpCollapse   = el("jump-collapse");

let idx = 0;
let theme = "dark";
let sectionsOpen = false;   // jump-row collapsed by default for more reading room

/* ── storage ─────────────────────────────────────── */
function storeGet(k) {
  try { return localStorage.getItem(k); } catch (e) { return null; }
}
function storeSet(k, v) {
  try { localStorage.setItem(k, v); } catch (e) {}
}

(function restore() {
  const savedIdx = parseInt(storeGet("vcmv3_idx"), 10);
  if (!isNaN(savedIdx) && savedIdx >= 0 && savedIdx < BEATS.length) idx = savedIdx;
  const savedTheme = storeGet("vcmv3_theme");
  if (savedTheme === "light" || savedTheme === "dark") theme = savedTheme;
  const savedSections = storeGet("vcmv3_sections");
  if (savedSections === "1") sectionsOpen = true;   // default stays collapsed
})();

/* ── theme ───────────────────────────────────────── */
function applyTheme() {
  document.documentElement.setAttribute("data-theme", theme);
  themeIcn.textContent = (theme === "dark") ? "☀︎" : "☾";
  themeBtn.setAttribute("aria-label", theme === "dark" ? "Switch to light theme" : "Switch to dark theme");
  const metas = document.querySelectorAll('meta[name="theme-color"]');
  metas.forEach(m => m.setAttribute("content", theme === "dark" ? "#0B1220" : "#FFFFFF"));
}
function toggleTheme() {
  theme = (theme === "dark") ? "light" : "dark";
  storeSet("vcmv3_theme", theme);
  applyTheme();
}

/* ── sections (jump-row) collapse ────────────────── */
function applySectionsState() {
  jumpCollapse.classList.toggle("open", sectionsOpen);
  sectionsToggle.setAttribute("aria-expanded", sectionsOpen ? "true" : "false");
}
function toggleSections() {
  sectionsOpen = !sectionsOpen;
  storeSet("vcmv3_sections", sectionsOpen ? "1" : "0");
  applySectionsState();
}

/* ── render ──────────────────────────────────────── */
function render() {
  const beat = BEATS[idx];

  let dotsHtml = "";
  for (let i = 0; i < BEATS.length; i++) {
    dotsHtml += `<span class="dot${i === idx ? " active" : ""}" role="tab" aria-selected="${i === idx}"></span>`;
  }
  dotsEl.innerHTML = dotsHtml;

  timeEl.textContent  = beat.time;
  titleEl.textContent = beat.title;
  claimEl.textContent = beat.claim;

  // arrows as separate elements so the indent stays clean on wrap
  let linesHtml = "";
  (beat.lines || []).forEach((line) => {
    const safe = String(line).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    linesHtml += `<div class="line"><span class="arrow" aria-hidden="true">→</span><span>${safe}</span></div>`;
  });
  linesEl.innerHTML = linesHtml;

  if (beat.land) {
    landEl.textContent = beat.land;
    landEl.hidden = false;
  } else {
    landEl.hidden = true;
  }

  scopeEl.textContent = beat.scope;
  countEl.textContent = `${idx + 1} / ${BEATS.length}`;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === BEATS.length - 1;

  // jump button active state
  const inRange = (r) => idx >= r[0] && idx <= r[1];
  [jumpS, jumpW, jumpL].forEach(b => b.removeAttribute("aria-current"));
  if (inRange(JUMP_RANGE.strengths))  jumpS.setAttribute("aria-current", "true");
  if (inRange(JUMP_RANGE.weaknesses)) jumpW.setAttribute("aria-current", "true");
  if (inRange(JUMP_RANGE.limits))     jumpL.setAttribute("aria-current", "true");

  storeSet("vcmv3_idx", String(idx));
}

function goTo(i) {
  idx = Math.max(0, Math.min(BEATS.length - 1, i));
  render();
  window.scrollTo({ top: 0, behavior: "auto" });
}

/* ── events ──────────────────────────────────────── */
prevBtn.addEventListener("click", () => goTo(idx - 1));
nextBtn.addEventListener("click", () => goTo(idx + 1));
jumpS.addEventListener("click", () => goTo(JUMP_INDEX.strengths));
jumpW.addEventListener("click", () => goTo(JUMP_INDEX.weaknesses));
jumpL.addEventListener("click", () => goTo(JUMP_INDEX.limits));
themeBtn.addEventListener("click", toggleTheme);
sectionsToggle.addEventListener("click", toggleSections);

document.addEventListener("keydown", (e) => {
  if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
  if (e.key === "ArrowRight" || e.key === " " || e.key === "Spacebar") {
    e.preventDefault(); goTo(idx + 1);
  } else if (e.key === "ArrowLeft") {
    e.preventDefault(); goTo(idx - 1);
  }
});

/* ── init ────────────────────────────────────────── */
applyTheme();
applySectionsState();
render();
</script>
</body>
</html>
